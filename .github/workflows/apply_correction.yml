name: Apply Correction (approve/reject)

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  handle-command:
    # Only respond to commands from the project owner
    if: |
      github.event.comment.user.login == 'johnb' &&
      contains(github.event.issue.labels.*.name, 'data-quality') &&
      (startsWith(github.event.comment.body, '/approve') ||
       startsWith(github.event.comment.body, '/reject'))
    runs-on: ubuntu-latest

    steps:
      - name: Parse command and issue
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const commentBody = context.payload.comment.body.trim();
            const issueNumber = context.payload.issue.number;
            const issueBody   = context.payload.issue.body || '';

            // ── Determine command type ────────────────────────────────────
            const isApprove = commentBody.startsWith('/approve');
            const isReject  = commentBody.startsWith('/reject');
            core.setOutput('is_approve', isApprove ? 'true' : 'false');
            core.setOutput('is_reject',  isReject  ? 'true' : 'false');

            // ── Parse /approve spot_check=TYPE note="..." ─────────────────
            let spotCheckType = '';
            let note          = '';
            let rejectReason  = '';

            if (isApprove) {
              const scMatch = commentBody.match(/spot_check=(\S+)/);
              spotCheckType = scMatch ? scMatch[1] : 'confirmed';

              const noteMatch = commentBody.match(/note="([^"]+)"/);
              note = noteMatch ? noteMatch[1] : '';
            }

            if (isReject) {
              const reasonMatch = commentBody.match(/reason="([^"]+)"/);
              rejectReason = reasonMatch ? reasonMatch[1] : 'No reason provided.';
            }

            // ── Extract parcel_id and neighborhood from issue body ─────────
            function extractField(label, body) {
              const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const re = new RegExp(`###\\s*${escaped}\\s*\\n+([^\\n#][^\\n]*)`, 'i');
              const m = body.match(re);
              if (!m) return '';
              const val = m[1].trim();
              return (val === '_No response_' || val === '') ? '' : val;
            }

            function toSlug(name) {
              return name.toLowerCase().replace(/[^\w-]/g, '_');
            }

            const parcelId    = extractField('Parcel ID (RPCMSTR)', issueBody);
            const neighborhood = extractField('Neighborhood', issueBody);
            const neighborhoodSlug = toSlug(neighborhood || 'unknown');
            const reporter    = context.payload.issue.user.login;

            if (!parcelId) {
              core.setFailed('Could not extract parcel_id from issue body.');
              return;
            }

            core.setOutput('parcel_id',         parcelId);
            core.setOutput('neighborhood',       neighborhood);
            core.setOutput('neighborhood_slug',  neighborhoodSlug);
            core.setOutput('spot_check_type',    spotCheckType);
            core.setOutput('note',               note);
            core.setOutput('reject_reason',      rejectReason);
            core.setOutput('reporter',           reporter);
            core.setOutput('issue_number',       String(issueNumber));

      # ── APPROVE PATH ──────────────────────────────────────────────────────

      - name: Checkout repo
        if: steps.parse.outputs.is_approve == 'true'
        uses: actions/checkout@v4

      - name: Create correction branch and JSON
        id: create_correction
        if: steps.parse.outputs.is_approve == 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER:      ${{ steps.parse.outputs.issue_number }}
          PARCEL_ID:         ${{ steps.parse.outputs.parcel_id }}
          NEIGHBORHOOD:      ${{ steps.parse.outputs.neighborhood }}
          NEIGHBORHOOD_SLUG: ${{ steps.parse.outputs.neighborhood_slug }}
          SPOT_CHECK_TYPE:   ${{ steps.parse.outputs.spot_check_type }}
          NOTE:              ${{ steps.parse.outputs.note }}
          REPORTER:          ${{ steps.parse.outputs.reporter }}
        with:
          script: |
            const issueNumber      = process.env.ISSUE_NUMBER;
            const parcelId         = process.env.PARCEL_ID;
            const neighborhood     = process.env.NEIGHBORHOOD;
            const neighborhoodSlug = process.env.NEIGHBORHOOD_SLUG;
            const spotCheckType    = process.env.SPOT_CHECK_TYPE;
            const note             = process.env.NOTE;
            const reporter         = process.env.REPORTER;
            const today           = new Date().toISOString().slice(0, 10);

            const branchName = `correction/issue-${issueNumber}`;
            const filePath   = `corrections/${neighborhoodSlug}/${issueNumber}.json`;

            const correctionData = {
              issue_number:       parseInt(issueNumber),
              parcel_id:          parcelId,
              neighborhood:       neighborhoodSlug,
              spot_check_result:  spotCheckType,
              spot_check_notes:   note,
              reporter:           reporter,
              reported_date:      today,
              approved_by:        'johnb',
              approved_date:      today,
            };

            const content = JSON.stringify(correctionData, null, 2) + '\n';
            const contentBase64 = Buffer.from(content).toString('base64');

            // Get default branch SHA
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   'heads/main',
            });
            const mainSha = ref.object.sha;

            // Create branch
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   `refs/heads/${branchName}`,
              sha:   mainSha,
            });

            // Create the corrections directory file
            await github.rest.repos.createOrUpdateFileContents({
              owner:   context.repo.owner,
              repo:    context.repo.repo,
              path:    filePath,
              message: `Add correction for issue #${issueNumber}: parcel ${parcelId}`,
              content: contentBase64,
              branch:  branchName,
            });

            core.setOutput('branch_name', branchName);
            core.setOutput('file_path',   filePath);

      - name: Create pull request
        id: create_pr
        if: steps.parse.outputs.is_approve == 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER:      ${{ steps.parse.outputs.issue_number }}
          PARCEL_ID:         ${{ steps.parse.outputs.parcel_id }}
          NEIGHBORHOOD:      ${{ steps.parse.outputs.neighborhood }}
          NEIGHBORHOOD_SLUG: ${{ steps.parse.outputs.neighborhood_slug }}
          SPOT_CHECK_TYPE:   ${{ steps.parse.outputs.spot_check_type }}
          NOTE:              ${{ steps.parse.outputs.note }}
          BRANCH_NAME:       ${{ steps.create_correction.outputs.branch_name }}
          FILE_PATH:         ${{ steps.create_correction.outputs.file_path }}
        with:
          script: |
            const issueNumber      = process.env.ISSUE_NUMBER;
            const parcelId         = process.env.PARCEL_ID;
            const neighborhood     = process.env.NEIGHBORHOOD;
            const neighborhoodSlug = process.env.NEIGHBORHOOD_SLUG;
            const spotCheckType    = process.env.SPOT_CHECK_TYPE;
            const note             = process.env.NOTE;
            const branchName       = process.env.BRANCH_NAME;
            const filePath         = process.env.FILE_PATH;

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[Correction] Issue #${issueNumber}: ${parcelId} — ${neighborhood}`,
              head:  branchName,
              base:  'main',
              body: [
                `Closes #${issueNumber}`,
                '',
                '## Correction details',
                '',
                `- **Parcel:** \`${parcelId}\``,
                `- **Neighborhood:** ${neighborhood} (\`${neighborhoodSlug}\`)`,
                `- **Spot check result:** \`${spotCheckType}\``,
                `- **Note:** ${note || '_(none)_'}`,
                '',
                `**Correction file:** \`${filePath}\``,
                '',
                'After merging, run the **DQ: Apply Merged Corrections** VS Code task to update `spot_checks.csv`, then re-run the pipeline for this neighborhood.',
              ].join('\n'),
            });

            core.setOutput('pr_url',    pr.html_url);
            core.setOutput('pr_number', String(pr.number));

      - name: Post PR link on issue
        if: steps.parse.outputs.is_approve == 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.parse.outputs.issue_number }}
          PR_URL:       ${{ steps.create_pr.outputs.pr_url }}
          PR_NUMBER:    ${{ steps.create_pr.outputs.pr_number }}
        with:
          script: |
            const issueNumber = process.env.ISSUE_NUMBER;
            const prUrl       = process.env.PR_URL;
            const prNumber    = process.env.PR_NUMBER;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: parseInt(issueNumber),
              body: [
                `Correction approved. PR #${prNumber} created: ${prUrl}`,
                '',
                'Merge the PR, then run the **DQ: Apply Merged Corrections** VS Code task to update `spot_checks.csv`.',
              ].join('\n'),
            });

      # ── REJECT PATH ──────────────────────────────────────────────────────

      - name: Post rejection and close issue
        if: steps.parse.outputs.is_reject == 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER:  ${{ steps.parse.outputs.issue_number }}
          REJECT_REASON: ${{ steps.parse.outputs.reject_reason }}
        with:
          script: |
            const issueNumber = process.env.ISSUE_NUMBER;
            const reason      = process.env.REJECT_REASON;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: parseInt(issueNumber),
              body: [
                '**Correction rejected.**',
                '',
                `**Reason:** ${reason}`,
                '',
                'No changes will be made to the pipeline data for this parcel. If you believe this decision is incorrect, please open a new issue with additional evidence.',
              ].join('\n'),
            });

            await github.rest.issues.addLabels({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: parseInt(issueNumber),
              labels:       ['rejected'],
            });

            await github.rest.issues.update({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: parseInt(issueNumber),
              state:        'closed',
              state_reason: 'not_planned',
            });
